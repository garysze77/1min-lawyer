<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Scales of Justice with modern styling -->
  <circle cx="24" cy="24" r="23" fill="#FF6B35" fill-opacity="0.1"/>
  <circle cx="24" cy="24" r="20" stroke="#FF6B35" stroke-width="2" fill="none"/>
  
  <!-- Center pillar -->
  <rect x="22" y="10" width="4" height="16" rx="2" fill="#FF6B35"/>
  
  <!-- Base -->
  <rect x="16" y="26" width="16" height="3" rx="1.5" fill="#FF6B35"/>
  
  <!-- Balance beam -->
  <rect x="8" y="12" width="32" height="3" rx="1.5" fill="#FF6B35"/>
  
  <!-- Left pan string -->
  <line x1="12" y1="15" x2="12" y2="20" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right pan string -->
  <line x1="36" y1="15" x2="36" y2="20" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Left pan -->
  <ellipse cx="12" cy="21" rx="5" ry="2" fill="#FF6B35"/>
  <!-- Right pan -->
  <ellipse cx="36" cy="21" rx="5" ry="2" fill="#FF6B35"/>
  
  <!-- Top ornament -->
  <circle cx="24" cy="7" r="3" fill="#FF6B35"/>
</svg>
